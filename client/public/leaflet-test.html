sudo tee leaflet-test.html > /dev/null << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <title>Leaflet Test</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
      border: 2px solid black;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const map = L.map("map").setView([51.355417, -0.223868], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    L.circle([51.355417, -0.223868], {
      radius: 5000,
      color: "red",
      fillColor: "red",
      fillOpacity: 0.4,
    }).addTo(map);
  </script>
</body>
</html>
EOF
